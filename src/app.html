<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2efe9" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#191817" />
		<meta name="application-name" content="A Room of One’s Own" />
		<meta name="apple-mobile-web-app-title" content="One’s Own" />
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚪</text></svg>"
		/>
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/icons/icon-180.png" />
		%sveltekit.head%
	</head>
	<body>
		<!-- The whole app is JavaScript — the draft saves to local storage, the
		     rooms switch, nothing renders without it. So the editor stays
		     read-only until it loads, and a visitor with JS off should be told why
		     the page looks inert rather than left to type into a box that keeps
		     nothing. Plain markup, no styles to load, allowed by default-src. -->
		<noscript>
			<p style="margin: 1rem; font-family: Georgia, serif; color: #2f2b25">
				A Room of One’s Own needs JavaScript: it keeps your writing in this browser and
				never sends it anywhere, which is the whole point. With JavaScript off, the page
				can’t save, so it stays read-only.
			</p>
		</noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
